{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">

    <h2 class="text-center fw-bold mb-4">Messages Dashboard</h2>

    <div class="card shadow-sm">

        <div class="table-responsive">
            <table class="table table-striped mb-0">

                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Message</th>
                        <th>Date</th>
                    </tr>
                </thead>

                <tbody>
                    {% for msg in messages %}
                    <tr>
                        <td>{{ msg.name }}</td>
                        <td>{{ msg.email }}</td>
                        <td>{{ msg.message|truncatechars:50 }}</td>
                        <td>{{ msg.created_at }}</td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>

    </div>

</div>

{% endblock %}
