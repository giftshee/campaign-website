{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">

    <h2 class="fw-bold text-center mb-4">Dashboard - News</h2>

    <div class="row g-3">

        {% for item in news %}
        <div class="col-md-4">
            <div class="card shadow-sm h-100">

                {% if item.image %}
                <img src="{{ item.image.url }}" class="card-img-top" style="height:200px; object-fit:cover;">
                {% endif %}

                <div class="card-body">
                    <h5>{{ item.title }}</h5>
                    <p class="text-muted small">{{ item.date }}</p>
                </div>

            </div>
        </div>
        {% endfor %}

    </div>

</div>

{% endblock %}
