<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            background: #0d6efd;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.2);
        }

        .main {
            margin-left: 260px;
            padding: 20px;
        }

        .card-box {
            border-radius: 15px;
            padding: 20px;
            color: white;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h3>📊 Dashboard</h3>
    <hr>

    <a href="/dashboard/">🏠 Overview</a>
    <a href="/dashboard/volunteers/">👥 Volunteers</a>
    <a href="/dashboard/news/">📰 News</a>
    <a href="/dashboard/messages/">✉ Messages</a>
    <a href="/dashboard/manifesto/">📜 Manifesto</a>
    <a href="/">🔙 Back to Site</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
