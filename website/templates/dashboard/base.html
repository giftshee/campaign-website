<!DOCTYPE html>
<html>
<head>
    <title>Campaign Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            background: #0d6efd;
            color: white;
            padding-top: 20px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
            border-radius: 8px;
            margin: 5px 10px;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.2);
        }

        .main {
            margin-left: 260px;
            padding: 20px;
        }

        .card {
            border: none;
            border-radius: 12px;
        }

        .stat-card {
            transition: 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h4 class="text-center mb-4">
        <i class="bi bi-megaphone"></i> Campaign
    </h4>

    <a href="{% url 'dashboard' %}">
        <i class="bi bi-speedometer2"></i> Overview
    </a>

    <a href="{% url 'dashboard_news' %}">
        <i class="bi bi-newspaper"></i> News
    </a>

    <a href="{% url 'dashboard_volunteers' %}">
        <i class="bi bi-people"></i> Volunteers
    </a>

    <a href="{% url 'dashboard_messages' %}">
        <i class="bi bi-chat-dots"></i> Messages
    </a>

    <a href="{% url 'dashboard_manifesto' %}">
        <i class="bi bi-file-text"></i> Manifesto
    </a>

    <a href="{% url 'logout' %}">
        <i class="bi bi-box-arrow-right"></i> Logout
    </a>

</div>

<!-- MAIN -->
<div class="main">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
