{% extends 'base.html' %}

{% block content %}

<style>
    body {
        background: #f4f6f9;
    }

    .contact-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .contact-card {
        width: 100%;
        max-width: 600px;
        background: #ffffff;
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .contact-title {
        text-align: center;
        font-weight: 700;
        margin-bottom: 20px;
        color: #111827;
    }

    .form-control {
        border-radius: 10px;
        padding: 10px;
    }

    .btn-primary {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        background: #2563eb;
        border: none;
        font-weight: 600;
    }

    .btn-primary:hover {
        background: #1e40af;
    }

    .contact-subtext {
        text-align: center;
        color: #6b7280;
        margin-bottom: 25px;
    }
</style>

<div class="contact-wrapper">

    <div class="contact-card">

        <h2 class="contact-title">📩 Contact Our Campaign</h2>

        <p class="contact-subtext">
            Share your message, ideas, or support. We listen to every citizen.
        </p>

        <form method="POST">
            {% csrf_token %}

            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small">
                            {{ field.errors }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="btn btn-primary">
                Send Message
            </button>
        </form>

    </div>

</div>

{% endblock %}
