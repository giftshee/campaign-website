{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h2 class="text-center mb-4">Volunteer Applications</h2>

    <div class="table-responsive">

        <table class="table table-striped table-hover">

            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Message</th>
                    <th>Date</th>
                </tr>
            </thead>

            <tbody>

                {% for v in volunteers %}
                <tr>
                    <td>{{ v.name }}</td>
                    <td>{{ v.phone }}</td>
                    <td>{{ v.email }}</td>
                    <td>{{ v.message|truncatechars:50 }}</td>
                    <td>{{ v.date|date:"F d, Y" }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="5" class="text-center">No volunteers yet</td>
                </tr>
                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
